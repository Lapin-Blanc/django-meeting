{% extends "admin/change_form.html" %}

{% block content %}
<style>
#branding-preview-panel {
    margin: 0 0 24px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
    background: #f8f9fa;
}
#branding-preview-panel h3 {
    margin: 0;
    padding: 10px 16px;
    background: #417690;
    color: white;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
}
#preview-content { padding: 16px; }

/* Simulated nav bar */
#preview-navbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-radius: 4px;
    margin-bottom: 16px;
    min-height: 52px;
}
#preview-navbar img {
    height: 44px;
    width: auto;
    object-fit: contain;
    transition: height 0.2s;
}
#preview-navbar .preview-site-name {
    font-size: 18px;
    font-weight: 700;
    color: white;
    letter-spacing: 0.3px;
}
#preview-navbar .preview-btn-primary {
    margin-left: auto;
    padding: 6px 14px;
    border: 2px solid white;
    border-radius: 5px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    background: transparent;
}

/* Simulated card */
#preview-card {
    border-radius: 6px;
    overflow: hidden;
    background: white;
    border: 1px solid #e5e7eb;
    max-width: 480px;
}
#preview-card-header {
    padding: 12px 16px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
}
#preview-card-body {
    padding: 12px 16px 16px;
}
#preview-card-body .preview-poll-title {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 6px;
}
#preview-card-body .preview-poll-sub {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 12px;
}
#preview-card-body .preview-btn-action {
    display: inline-block;
    padding: 8px 18px;
    border-radius: 5px;
    color: white;
    font-size: 13px;
    font-weight: 600;
}

/* Color swatches */
#preview-swatches {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    align-items: center;
}
.preview-swatch {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #374151;
}
.preview-swatch-color {
    width: 32px;
    height: 32px;
    border-radius: 5px;
    border: 1px solid #d1d5db;
    flex-shrink: 0;
}
</style>

<div id="branding-preview-panel">
    <h3>Prévisualisation du thème</h3>
    <div id="preview-content">
        <div id="preview-navbar">
            <img id="preview-logo" src="" alt="" style="display:none">
            <span id="preview-site-name" class="preview-site-name"></span>
            <span class="preview-btn-primary">Administration</span>
        </div>

        <div id="preview-card">
            <div id="preview-card-header"></div>
            <div id="preview-card-body">
                <div class="preview-poll-title">Réunion d'équipe — mars 2026</div>
                <div class="preview-poll-sub">Date limite de vote : 27/03/2026 à 12:00</div>
                <div id="preview-btn-action" class="preview-btn-action">Voter</div>
            </div>
        </div>

        <div id="preview-swatches">
            <div class="preview-swatch">
                <div class="preview-swatch-color" id="swatch-primary"></div>
                <span>Couleur primaire</span>
            </div>
            <div class="preview-swatch">
                <div class="preview-swatch-color" id="swatch-secondary"></div>
                <span>Couleur secondaire</span>
            </div>
            <div class="preview-swatch">
                <div class="preview-swatch-color" id="swatch-header-text" style="border:2px solid #9ca3af;"></div>
                <span>Texte en-tête</span>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    function val(id) {
        var el = document.getElementById(id);
        return el ? el.value : '';
    }

    function updatePreview() {
        var siteName = val('id_site_name') || 'django-meeting';
        var primary = val('id_primary_color') || '#2563eb';
        var secondary = val('id_secondary_color') || '#1e40af';
        var headerText = val('id_header_text_color') || '#ffffff';
        var logoHeight = parseInt(val('id_logo_height')) || 70;
        var previewHeight = Math.min(Math.round(logoHeight * 0.6), 60);

        var previewLogoEl = document.getElementById('preview-logo');
        if (previewLogoEl) previewLogoEl.style.height = previewHeight + 'px';

        // Navbar
        var navbar = document.getElementById('preview-navbar');
        if (navbar) navbar.style.backgroundColor = primary;

        var nameEl = document.getElementById('preview-site-name');
        if (nameEl) { nameEl.textContent = siteName; nameEl.style.color = headerText; }

        var btnOutline = document.querySelector('#preview-navbar .preview-btn-primary');
        if (btnOutline) {
            btnOutline.style.color = headerText;
            btnOutline.style.borderColor = headerText;
        }

        // Card header
        var cardHeader = document.getElementById('preview-card-header');
        if (cardHeader) {
            cardHeader.style.backgroundColor = secondary + '18';
            cardHeader.style.color = secondary;
            cardHeader.textContent = 'Sondages de disponibilités';
        }

        // Action button
        var btnAction = document.getElementById('preview-btn-action');
        if (btnAction) btnAction.style.backgroundColor = primary;

        // Swatches
        var sp = document.getElementById('swatch-primary');
        if (sp) sp.style.backgroundColor = primary;
        var ss = document.getElementById('swatch-secondary');
        if (ss) ss.style.backgroundColor = secondary;
        var sh = document.getElementById('swatch-header-text');
        if (sh) sh.style.backgroundColor = headerText;

        // Logo: read from current file input or existing img
        var logoInput = document.querySelector('#id_logo');
        var existingLogoImg = document.querySelector('.field-logo_preview img');
        var previewLogo = document.getElementById('preview-logo');
        if (previewLogo) {
            if (logoInput && logoInput.files && logoInput.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    previewLogo.src = e.target.result;
                    previewLogo.style.display = 'block';
                };
                reader.readAsDataURL(logoInput.files[0]);
            } else if (existingLogoImg) {
                previewLogo.src = existingLogoImg.src;
                previewLogo.style.display = 'block';
            } else {
                previewLogo.style.display = 'none';
            }
        }
    }

    function bindEvents() {
        ['id_site_name', 'id_primary_color', 'id_secondary_color', 'id_header_text_color', 'id_logo_height'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', updatePreview);
                el.addEventListener('change', updatePreview);
            }
        });
        var logoInput = document.querySelector('#id_logo');
        if (logoInput) logoInput.addEventListener('change', updatePreview);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { bindEvents(); updatePreview(); });
    } else {
        bindEvents();
        updatePreview();
    }
})();
</script>
{{ block.super }}
{% endblock %}
