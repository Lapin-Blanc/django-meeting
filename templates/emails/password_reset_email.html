<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; color: #1a1a2e; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; background: #2563eb; color: white; text-decoration: none; border-radius: 0.375rem; }
    </style>
</head>
<body>
    <p>Bonjour,</p>
    <p>Vous avez demandé la réinitialisation de votre mot de passe sur <strong>{{ site_config.site_name }}</strong>.</p>
    <p>
        <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}" class="btn">
            Réinitialiser mon mot de passe
        </a>
    </p>
    <p>Ce lien est valable 24 heures.</p>
    <p>Si vous n'avez pas fait cette demande, ignorez cet email.</p>
    <p>L'équipe {{ site_config.site_name }}</p>
</body>
</html>
