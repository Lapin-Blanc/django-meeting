{% extends 'base.html' %}

{% block title %}Mot de passe modifié — {{ site_config.site_name }}{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card card">
        <h1 class="auth-title">Mot de passe modifié</h1>
        <p>Votre mot de passe a été réinitialisé avec succès.</p>
        <p class="auth-links">
            <a href="{% url 'accounts:login' %}" class="btn btn-primary">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
