{% extends 'base.html' %}

{% block title %}Email envoyé — {{ site_config.site_name }}{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card card">
        <h1 class="auth-title">Email envoyé</h1>
        <p>Si un compte correspond à cette adresse email, vous recevrez un lien de réinitialisation dans quelques instants.</p>
        <p class="auth-links">
            <a href="{% url 'accounts:login' %}">Retour à la connexion</a>
        </p>
    </div>
</div>
{% endblock %}
